<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ND PRO System | Nazael Diniz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #00f2ff;
            --danger: #ff2e63;
            --bg: #0b0d11;
            --card-bg: #161a23;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .app-shell { width: 100%; max-width: 480px; background: var(--bg); display: flex; flex-direction: column; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

        header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: var(--card-bg); }
        .brand { font-size: 1.2rem; font-weight: 800; color: var(--accent); letter-spacing: 2px; }
        .user-sig { font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        /* Banner Motivacional */
        .motivation-banner { padding: 15px; background: rgba(0, 242, 255, 0.05); text-align: center; border-bottom: 1px solid var(--border); }
        #quote { font-style: italic; font-size: 0.85rem; color: var(--accent); font-weight: 600; }

        .balance-hero { padding: 20px; text-align: center; background: linear-gradient(to bottom, var(--card-bg), transparent); }
        .balance-hero h1 { font-size: 2.2rem; font-weight: 200; color: #fff; margin-top: 5px; }

        .nav-tabs { display: flex; overflow-x: auto; padding: 10px; gap: 8px; background: #11141b; }
        .tab-link { flex: 0 0 auto; padding: 10px 15px; border-radius: 10px; background: transparent; border: 1px solid var(--border); color: #777; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .tab-link.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 50px; }
        .pane { display: none; }
        .pane.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.65rem; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; }

        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .btn-acc { background: var(--accent); color: #000; }

        /* Meta Styles */
        .progress-container { height: 8px; background: #000; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: 0.5s; }
        .meta-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 5px; border: none; font-size: 0.7rem; font-weight: bold; cursor: pointer; }

        /* Stock Styles */
        .stock-item { display: flex; justify-content: space-between; align-items: center; }
        .qty-control { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #333; color: white; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }

        footer { padding: 20px; text-align: center; font-size: 0.6rem; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="app-shell">
        <header>
            <div class="brand">ND PRO <span style="font-weight:200">SYSTEM</span></div>
            <div class="user-sig">Nazael Diniz Alves Primo Giblin</div>
        </header>

        <div class="motivation-banner">
            <span id="quote">"O sucesso é a soma de pequenos esforços repetidos dia após dia."</span>
        </div>

        <div class="balance-hero">
            <small style="color:var(--accent)">SALDO DISPONÍVEL</small>
            <h1 id="total-balance">R$ 0,00</h1>
        </div>

        <nav class="nav-tabs">
            <button class="tab-link active" onclick="openTab('finance')">Caixa</button>
            <button class="tab-link" onclick="openTab('goals')">Metas</button>
            <button class="tab-link" onclick="openTab('stock')">Estoque</button>
            <button class="tab-link" onclick="openTab('notes')">Notas</button>
        </nav>

        <main class="main-content">
            
            <div id="finance" class="pane active">
                <div class="card">
                    <div class="input-group"><label>Valor</label><input type="number" id="cash-val" placeholder="0,00"></div>
                    <div class="input-group"><label>Tipo</label><select id="cash-type"><option value="in">Depósito (+)</option><option value="out">Retirada (-)</option></select></div>
                    <button class="btn btn-acc" onclick="execFinance()">Confirmar no Saldo</button>
                </div>
            </div>

            <div id="goals" class="pane">
                <div class="card">
                    <input type="text" id="g-title" placeholder="Nome da Meta">
                    <input type="number" id="g-target" placeholder="Valor Objetivo (R$)" style="margin-top:8px">
                    <button class="btn btn-acc" onclick="addGoal()" style="margin-top:10px">Criar Meta</button>
                </div>
                <div id="goals-list"></div>
            </div>

            <div id="stock" class="pane">
                <div class="card">
                    <input type="text" id="s-name" placeholder="Item do Trabalho">
                    <input type="number" id="s-qty" placeholder="Quantidade Inicial" style="margin-top:8px">
                    <button class="btn btn-acc" onclick="addStock()" style="margin-top:10px">Adicionar Item</button>
                </div>
                <div id="stock-list"></div>
            </div>

            <div id="notes" class="pane">
                <div class="card">
                    <input type="text" id="n-title" placeholder="Título">
                    <input type="text" id="n-theme" placeholder="Tema" style="margin-top:8px">
                    <textarea id="n-body" rows="3" placeholder="Sua anotação aqui..." style="margin-top:8px"></textarea>
                    <button class="btn btn-acc" onclick="addNote()" style="margin-top:10px">Salvar Nota</button>
                </div>
                <div id="notes-list"></div>
            </div>

        </main>

        <footer>Nazael Diniz Alves Primo Giblin © 2026</footer>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('nd_pro_final')) || { balance: 0, stock: [], goals: [], notes: [] };

        const quotes = [
            "O sucesso é a soma de pequenos esforços repetidos dia após dia.",
            "Nazael, o seu império começa na sua disciplina.",
            "Trabalhe em silêncio e deixe o sucesso fazer o barulho.",
            "Se você quer algo que nunca teve, faça algo que nunca fez.",
            "Gestão é a arte de dominar o futuro agora."
        ];

        function save() { 
            localStorage.setItem('nd_pro_final', JSON.stringify(db)); 
            updateUI();
        }

        function openTab(id) {
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'goals') document.getElementById('quote').innerText = quotes[Math.floor(Math.random()*quotes.length)];
        }

        // --- CAIXA ---
        function execFinance() {
            const val = parseFloat(document.getElementById('cash-val').value);
            const type = document.getElementById('cash-type').value;
            if(!val || val <= 0) return;
            db.balance = type === 'in' ? db.balance + val : db.balance - val;
            document.getElementById('cash-val').value = "";
            save();
        }

        // --- METAS ---
        function addGoal() {
            const title = document.getElementById('g-title').value;
            const target = parseFloat(document.getElementById('g-target').value);
            if(!title || !target) return;
            db.goals.push({ id: Date.now(), title, target, current: 0 });
            save();
            document.getElementById('g-title').value = ""; document.getElementById('g-target').value = "";
        }

        function depositGoal(id) {
            const amount = parseFloat(prompt("Nazael, quanto deseja depositar nesta meta agora?"));
            if(!amount || amount <= 0) return;
            if(amount > db.balance) return alert("Saldo insuficiente no caixa principal!");

            const goal = db.goals.find(g => g.id === id);
            if(goal) {
                db.balance -= amount;
                goal.current += amount;
                save();
            }
        }

        function renderGoals() {
            const list = document.getElementById('goals-list');
            list.innerHTML = db.goals.map(g => {
                const perc = Math.min((g.current / g.target) * 100, 100).toFixed(1);
                return `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; font-weight:bold">
                            <span>${g.title}</span>
                            <span style="color:var(--accent)">${perc}%</span>
                        </div>
                        <div class="progress-container"><div class="progress-bar" style="width:${perc}%"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; opacity:0.6">
                            <span>Guardado: R$ ${g.current.toFixed(2)}</span>
                            <span>Alvo: R$ ${g.target.toFixed(2)}</span>
                        </div>
                        <div class="meta-actions">
                            <button class="btn-sm" style="background:var(--accent); color:#000" onclick="depositGoal(${g.id})">DEPOSITAR</button>
                            <button class="btn-sm" style="background:rgba(255,255,255,0.1); color:white" onclick="deleteItem('goals', ${g.id})">EXCLUIR</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- ESTOQUE ---
        function addStock() {
            const name = document.getElementById('s-name').value;
            const qty = parseInt(document.getElementById('s-qty').value) || 0;
            if(!name) return;
            db.stock.push({ id: Date.now(), name, qty });
            save();
            document.getElementById('s-name').value = ""; document.getElementById('s-qty').value = "";
        }

        function changeQty(id, delta) {
            const item = db.stock.find(s => s.id === id);
            if(item) { item.qty = Math.max(0, item.qty + delta); save(); }
        }

        function renderStock() {
            const list = document.getElementById('stock-list');
            list.innerHTML = db.stock.map(s => `
                <div class="card stock-item">
                    <span>${s.name}</span>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="changeQty(${s.id}, -1)">-</button>
                        <b style="color:var(--accent)">${s.qty}</b>
                        <button class="qty-btn" onclick="changeQty(${s.id}, 1)">+</button>
                        <i class="fas fa-trash" onclick="deleteItem('stock', ${s.id})" style="color:var(--danger); margin-left:10px; cursor:pointer"></i>
                    </div>
                </div>
            `).join('');
        }

        // --- NOTAS ---
        function addNote() {
            const title = document.getElementById('n-title').value;
            const theme = document.getElementById('n-theme').value;
            const body = document.getElementById('n-body').value;
            if(!title || !body) return;
            db.notes.unshift({ id: Date.now(), title, theme, body });
            save();
            document.getElementById('n-title').value = ""; document.getElementById('n-theme').value = ""; document.getElementById('n-body').value = "";
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = db.notes.map(n => `
                <div class="card">
                    <div style="font-size:0.6rem; color:var(--accent); text-transform:uppercase">${n.theme}</div>
                    <div style="font-weight:bold; margin:5px 0">${n.title}</div>
                    <div style="font-size:0.8rem; opacity:0.8">${n.body}</div>
                    <div style="text-align:right"><i class="fas fa-trash" onclick="deleteItem('notes', ${n.id})" style="color:var(--danger); margin-top:10px; cursor:pointer"></i></div>
                </div>
            `).join('');
        }

        function deleteItem(type, id) { db[type] = db[type].filter(x => x.id !== id); save(); }

        function updateUI() {
            document.getElementById('total-balance').innerText = db.balance.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
            renderGoals(); renderStock(); renderNotes();
        }

        updateUI();
    </script>
</body>
</html>
